<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 16px 0;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    .setting {
      margin-bottom: 16px;
    }
    .setting-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .setting label {
      font-weight: 500;
    }
    .setting p {
      margin: 0;
      font-size: 12px;
      color: #666;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.2s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.2s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #4285f4;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .blocklist {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
    }
    .blocklist label {
      font-weight: 500;
      display: block;
      margin-bottom: 8px;
    }
    .blocklist textarea {
      width: 100%;
      height: 80px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      resize: vertical;
    }
    .blocklist textarea:focus {
      outline: none;
      border-color: #4285f4;
    }
    .blocklist p {
      margin: 6px 0 0 0;
      font-size: 11px;
      color: #888;
    }
    .saved {
      color: #34a853;
      font-size: 12px;
      margin-left: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .saved.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>Tab Switcher Settings</h1>

  <div class="setting">
    <div class="setting-header">
      <label>Match by domain only</label>
      <label class="toggle">
        <input type="checkbox" id="baseUrlMode" checked>
        <span class="slider"></span>
      </label>
    </div>
    <p>ON: github.com/* matches any GitHub tab<br>OFF: Only exact URLs match</p>
  </div>

  <div class="blocklist">
    <label>Disabled websites <span class="saved" id="savedIndicator">Saved!</span></label>
    <textarea id="blocklist" placeholder="google.com&#10;twitter.com&#10;youtube.com"></textarea>
    <p>One domain per line. Extension won't activate for these sites.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
