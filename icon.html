<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 128px;
      height: 128px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon {
      font-size: 64px;
      filter: grayscale(1) brightness(100);
    }
  </style>
</head>
<body>
  <div class="icon">🔀</div>
</body>
</html>
