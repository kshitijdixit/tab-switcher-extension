<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 440px;
      height: 280px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: white;
      border-radius: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 {
      color: white;
      font-size: 28px;
      margin-bottom: 12px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .subtitle {
      color: rgba(255,255,255,0.9);
      font-size: 16px;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="icon">🔀</div>
  <h1>Tab Switcher</h1>
  <p class="subtitle">Stop duplicate tabs.<br>Switch to existing ones instead.</p>
</body>
</html>
